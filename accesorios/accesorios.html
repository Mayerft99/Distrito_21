<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesorios - Distrito 21</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body>

<header>
    <nav class="menu-superior">
        <a href="../index.html">Inicio</a>
        <a href="https://wa.me/75697356" target="_blank" rel="noopener noreferrer">Contacto</a>
    </nav>
    <div id="abrir-carrito" class="carrito-icono">
        🛒 <span id="contador-carrito">0</span>
    </div>
</header>

<div class="bloque-tituloseccion">
    <h1 class="titulo-principalseccion">Sección de Accesorios</h1>
</div>

<div class="contenedor">

    <aside class="menu-lateral">
        <div class="overlay">
            <h3>Categorías</h3>
            <a href="../accesorios/accesorios.html">Poleras</a>
            <a href="../pantalones/pantalones.html">Pantalones</a>
            <a href="../zapatos/zapatos.html">Zapatos</a>
            <a href="../accesorios/accesorios.html">Accesorios</a>
        </div>
    </aside>

    <main class="contenido">
        <!-- productos-grid igual que en el original -->
        <div class="productos-grid" id="grid-productos">
            <p style="color:#ddd; padding:20px;">Cargando productos...</p>
        </div>
    </main>

</div>

<!-- PANEL CARRITO — idéntico al original -->
<div id="panel-carrito" class="panel-carrito">
    <div class="carrito-header">
        <h3>Tu carrito</h3>
        <button id="cerrar-carrito">✖</button>
    </div>
    <div id="lista-carrito" class="lista-carrito">
        <p>El carrito está vacío</p>
    </div>
    <div class="carrito-footer">
        <p>Total: <span id="total-carrito">Bs. 0</span></p>
        <div class="formulario-cliente">
            <input type="text" id="cliente-nombre" placeholder="Nombre completo">
            <input type="text" id="cliente-telefono" placeholder="Teléfono">
            <input type="text" id="cliente-direccion" placeholder="Dirección de entrega">
            <select id="cliente-pago">
                <option value="">Método de pago</option>
                <option value="Efectivo">Efectivo</option>
                <option value="QR">QR</option>
            </select>
        </div>
        <button id="btn-whatsapp" class="boton-whatsapp">
            Finalizar compra por WhatsApp
        </button>
    </div>
</div>

<script>
// ── Fondo aleatorio ──
document.addEventListener("DOMContentLoaded", function () {
    const imagenes = ["../media/fondo1.jpg", "../media/fondo2.jpg", "../media/fondo3.jpg", "../media/fondo4.jpg"];
    const img = imagenes[Math.floor(Math.random() * imagenes.length)];
    document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),url(${img})`;
    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundPosition = "center";
    document.body.style.backgroundAttachment = "fixed";
});

// ── Header scroll en móvil ──
document.addEventListener("DOMContentLoaded", function () {
    let lastScrollTop = 0;
    const header = document.querySelector('header');
    window.addEventListener('scroll', function () {
        if (window.innerWidth <= 768) {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop < lastScrollTop) header.classList.add('header-visible');
            else header.classList.remove('header-visible');
            if (scrollTop <= 20) header.classList.remove('header-visible');
            lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
        }
    }, { passive: true });
});

// ── Supabase ──
const SUPABASE_URL = 'https://qhpyclwnddylziambbsj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFocHljbHduZGR5bHppYW1iYnNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzI1NzAsImV4cCI6MjA4OTgwODU3MH0._JEYSQcOhg9TFhhVR_O6lYwMXhUFxj5Osx4PEFPKsQ0';

async function cargarProductos() {
    const grid = document.getElementById('grid-productos');
    try {
        // 1. Obtener ID de categoría "poleras"
        const catRes = await fetch(
            `${SUPABASE_URL}/rest/v1/categorias?slug=eq.accesorios&select=id`,
            { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const cats = await catRes.json();
        if (!cats.length) {
            grid.innerHTML = '<p style="color:#ddd;padding:20px;">No se encontró la categoría.</p>';
            return;
        }

        // 2. Obtener productos activos
        const prodRes = await fetch(
            `${SUPABASE_URL}/rest/v1/productos?categoria_id=eq.${cats[0].id}&activo=eq.true&select=*&order=created_at.desc`,
            { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const productos = await prodRes.json();

        if (!productos.length) {
            grid.innerHTML = '<p style="color:#ddd;padding:20px;">No hay productos disponibles por el momento.</p>';
            return;
        }

        // 3. Renderizar — misma estructura HTML que el original para que el CSS funcione igual
        grid.innerHTML = productos.map(p => {
            // Tallas: "S, M, L, XL" → array limpio
            const tallas = p.tallas ? p.tallas.split(',').map(t => t.trim()).filter(Boolean) : [];

            const tallasHTML = tallas.length ? `
                <div class="menu-desplegable">
                    <button class="boton-desplegable">Seleccionar Talla</button>
                    <div class="contenido-desplegable">
                        ${tallas.map(t => `<a href="#" data-talla="${t}">${t}</a>`).join('')}
                    </div>
                </div>` : '';

            // La imagen necesita width:300px para el layout flex horizontal del CSS
            return `
                <section class="producto-card"
                    data-nombre="${p.nombre.replace(/"/g, '&quot;')}"
                    data-precio="${p.precio}">
                    <div class="imagen-contenedor">
                        <img src="${p.imagen_url || '../media/placeholder.png'}"
                             alt="${p.nombre}"
                             style="width:300px; border-radius:10px; object-fit:cover;">
                    </div>
                    <div class="info-producto">
                        <h2>${p.nombre}</h2>
                        ${p.descripcion ? `<p class="descripcion">${p.descripcion}</p>` : ''}
                        <p class="precio">Bs. ${p.precio}</p>
                        ${tallasHTML}
                        <button class="boton-comprar">🛒 Agregar Al Carrito</button>
                    </div>
                </section>`;
        }).join('');

        // 4. Activar lógica de tallas y carrito en cada tarjeta
        activarTarjetas();

    } catch (e) {
        console.error(e);
        grid.innerHTML = '<p style="color:#ddd;padding:20px;">Error al cargar productos.</p>';
    }
}

function activarTarjetas() {
    document.querySelectorAll(".producto-card").forEach(card => {
        const botonTalla    = card.querySelector(".boton-desplegable");
        const tallaLinks    = card.querySelectorAll(".contenido-desplegable a");
        const botonComprar  = card.querySelector(".boton-comprar");
        // Leer nombre y precio desde data-attributes (evita problemas con comillas en JS inline)
        const nombreProducto = card.dataset.nombre;
        const precio         = parseInt(card.dataset.precio);
        let tallaSeleccionada = null;

        // Selección de talla
        tallaLinks.forEach(talla => {
            talla.addEventListener("click", function (e) {
                e.preventDefault();
                tallaLinks.forEach(t => t.classList.remove("talla-seleccionada"));
                this.classList.add("talla-seleccionada");
                tallaSeleccionada = this.dataset.talla;
                botonTalla.textContent = "Talla: " + tallaSeleccionada;
            });
        });

        // Agregar al carrito — usa la función de carrito.js tal cual
        botonComprar.addEventListener("click", function () {
            if (tallaLinks.length > 0 && !tallaSeleccionada) {
                botonComprar.textContent = "⚠ Selecciona una talla";
                setTimeout(() => { botonComprar.textContent = "🛒 Agregar Al Carrito"; }, 1500);
                return;
            }

            // Mismo objeto que espera carrito.js: { nombre, precio, talla }
            agregarAlCarrito({
                nombre: nombreProducto,
                precio: precio,
                talla:  tallaSeleccionada || ''
            });

            botonComprar.textContent = "✓ Agregado";
            setTimeout(() => { botonComprar.textContent = "🛒 Agregar Al Carrito"; }, 1500);
        });
    });
}

cargarProductos();
</script>

<!-- carrito.js va DESPUÉS del script de productos para que agregarAlCarrito esté disponible -->
<script src="../js/carrito.js"></script>
<div id="mensaje-carrito" class="mensaje-carrito"></div>

</body>
</html>
