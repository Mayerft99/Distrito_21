<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesorios - Distrito 21</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body>

<header>
    <nav class="menu-superior">
        <a href="../index.html">Inicio</a>
        <a href="https://wa.me/75697356" target="_blank" rel="noopener noreferrer">Contacto</a>
    </nav>
    <div id="abrir-carrito" class="carrito-icono">
        🛒 <span id="contador-carrito">0</span>
    </div>
</header>

<div class="bloque-tituloseccion">
    <h1 class="titulo-principalseccion">Sección de Accesorios</h1>
</div>

<div class="contenedor">

    <aside class="menu-lateral">
        <div class="overlay">
            <h3>Categorías</h3>
            <a href="../poleras/poleras.html">Poleras</a>
            <a href="../pantalones/pantalones.html">Pantalones</a>
            <a href="../zapatos/zapatos.html">Zapatos</a>
            <a href="accesorios.html">Accesorios</a>
        </div>
    </aside>

    <main class="contenido">
        <!-- productos-grid igual que en el original -->
        <div class="productos-grid" id="grid-productos">
            <p style="color:#ddd; padding:20px;">Cargando productos...</p>
        </div>
    </main>

</div>

<!-- PANEL CARRITO -->
<div id="panel-carrito" class="panel-carrito">
    <div class="carrito-header">
        <h3>Tu carrito</h3>
        <button id="cerrar-carrito">✖</button>
    </div>
    <div id="lista-carrito" class="lista-carrito">
        <p>El carrito está vacío</p>
    </div>
    <div class="carrito-footer">
        <p>Total: <span id="total-carrito">Bs. 0</span></p>
        <div class="formulario-cliente">

            <input type="text" id="cliente-nombre" placeholder="Nombre completo">
            <input type="text" id="cliente-telefono" placeholder="Teléfono / WhatsApp">

            <!-- Dirección -->
            <input type="text" id="cliente-direccion" placeholder="Dirección de entrega (ej: Av. Banzer km 5)">

            <!-- Separador -->
            <div style="display:flex; align-items:center; gap:8px; margin: 2px 0;">
                <div style="flex:1; height:1px; background:rgba(255,255,255,0.15)"></div>
                <span style="font-size:11px; color:rgba(255,255,255,0.4)">o pega tu ubicación</span>
                <div style="flex:1; height:1px; background:rgba(255,255,255,0.15)"></div>
            </div>

            <!-- Google Maps link -->
            <div style="position:relative">
                <span style="position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none">📍</span>
                <input type="url" id="cliente-maps"
                    placeholder="Link de Google Maps"
                    style="padding-left:34px">
            </div>
            <p style="font-size:10px; color:rgba(255,255,255,0.4); margin-top:-4px; padding: 0 4px; line-height:1.4">
                Abre Google Maps → comparte tu ubicación → copia el link y pégalo aquí
            </p>

            <!-- Método de pago: solo QR y Efectivo -->
            <select id="cliente-pago">
                <option value="">Método de pago</option>
                <option value="QR">📱 QR Banco Económico</option>
                <option value="Efectivo">💵 Efectivo contra entrega</option>
            </select>

        </div>
        <button id="btn-whatsapp" class="boton-whatsapp">
            Finalizar compra →
        </button>
    </div>
</div>


<script src="../js/carrito.js"></script>
<div id="mensaje-carrito" class="mensaje-carrito"></div>

</body>
</html>
